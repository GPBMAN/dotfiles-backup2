
###############
### PLUGINS ###
###############

plugin {
    hyprscrolling {
        column_width = 0.7
        fullscreen_on_one_column = true
	focus_fit_method = 1
	follow_debounce_ms = 2000 
    }

    hyprexpo {
        columns = 3
        gap_size = 5
        bg_col = rgb(111111)
        workspace_method = center current # [center/first] [workspace] e.g. first 1 or center m+1

        gesture_distance = 300 # how far is the "max" for the gesture
    }
   
    
    hyprbars {
    	enabled = false
        bar_title_enabled = false
        bar_height = 25
	bar_buttons_alignment = left
	bar_part_of_window = true
	bar_color = rgba(15,12,27,0.3) 

        # example buttons (R -> L)
        # hyprbars-button = color, size, on-click
        hyprbars-button = rgb(ff4040), 20, , hyprctl dispatch killactive
        hyprbars-button = rgb(eeee11), 20, , hyprctl dispatch fullscreen 1

        # cmd to run on double click of the bar
        on_double_click = hyprctl dispatch fullscreen 1
    
    }
    
    
}

